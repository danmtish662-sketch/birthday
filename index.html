<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy belated Birthday My Love ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(to bottom,#ffb6c1,#ffe4e1);
    overflow:hidden;
}

.container{
    position:relative;
    z-index:2;
    margin-top:50px;
}

h1{
    color:#d63384;
    font-size:3em;
}

p{
    font-size:1.3em;
    color:#444;
}

img{
    width:280px;
    border-radius:20px;
    box-shadow:0 0 20px white;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#ff4081;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#e91e63;
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:red;
    font-size:25px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-150px;
    font-size:60px;
    animation:rise 10s linear infinite;
}

@keyframes rise{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy belated Birthday Edith ❤️</h1>

    <p>
        You make every day brighter and more beautiful.<br>
        I am lucky to have you in my life. ❤️
    </p>

    <h2>Will you be mine forever? 💍</h2>

    <button onclick="alert('I Love You ❤️')">
        Yes ❤️
    </button>
</div>

<!-- Balloons -->
<div class="balloon" style="left:10%;">🎈</div>
<div class="balloon" style="left:30%;animation-delay:2s;">🎈</div>
<div class="balloon" style="left:50%;animation-delay:4s;">🎈</div>
<div class="balloon" style="left:70%;animation-delay:1s;">🎈</div>
<div class="balloon" style="left:90%;animation-delay:3s;">🎈</div>

<!-- Hearts -->
<div class="heart" style="left:15%;animation-delay:0s;">❤️</div>
<div class="heart" style="left:35%;animation-delay:2s;">❤️</div>
<div class="heart" style="left:55%;animation-delay:4s;">❤️</div>
<div class="heart" style="left:75%;animation-delay:1s;">❤️</div>
<div class="heart" style="left:95%;animation-delay:3s;">❤️</div>

</body>
</html>
